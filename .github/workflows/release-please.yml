name: Release Please

# Disabled for the web-only (Railway) deployment: this cut versioned desktop
# installers and required "Allow GitHub Actions to create pull requests", which
# isn't enabled — so it failed on every push to main. Switched to manual-only
# (workflow_dispatch) so it no longer runs automatically. To re-enable desktop
# releases, restore the `push: branches: [main]` trigger and enable that repo
# setting (Settings → Actions → General → Workflow permissions).
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      release_id: ${{ steps.release.outputs.id }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-release:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
      release_id: ${{ needs.release-please.outputs.release_id }}
    secrets: inherit

  packaging:
    needs: [release-please, build-and-release]
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/packaging.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit

  update-homebrew:
    needs: [release-please, build-and-release]
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/update-homebrew.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
